<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance Tracker</title>
    <link rel="stylesheet" href="./styles/style.css">
    <script type="module" src="./src/app.js"></script>
</head>

<body>
    <main class="mobile-container">
        <header>
            <h1>My Finances</h1>
            <button id="login-btn" class="transferBtn">Login with Google</button>
        </header>

        <div id="app-content" style="display: none;">
        </div>

        <section id="dashboard">
            <div class="balance-card chk1">Checking 100: <span id="chk1-bal">$0</span></div>
            <div class="balance-card chk2">Checking 101: <span id="chk2-bal">$0</span></div>
            <div class="balance-card chk3">Pocket Change: <span id="chk3-bal">$0</span></div>
            <div class="balance-card balance-saving">Savings: <span id="savings-bal">$0</span></div>
            <div class="balance-card credit">Credit Card: <span id="cc-bal">$0</span></div>
            <div class="balance-card total">Total: <span id="total-bal">$0</span></div>
        </section>

        <canvas id="expenseChart"></canvas>

        <section id="inputs">
            <h3>Add Expense</h3>
            <input type="date" id="exp-date">
            <input type="number" id="exp-amount" placeholder="Amount">
            <select id="exp-category">
                <option value="Groceries">Groceries</option>
                <option value="Bills">Bills</option>
                <option value="LEGO/Hobbies">Hobbies</option>
                <option value="Car">Car</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Eating">Eating Out</option>
                <option value="Shopping">Shopping</option>
                <option value="Tithing">Tithing</option>
            </select>
            <input type="text" id="expense-name" placeholder="Name">
            <select id="exp-account">
                <option value="chk1">Checking 100</option>
                <option value="chk2">Checking 101</option>
                <option value="chk3">Pocket Change</option>
                <option value="sav">Savings</option>
                <option value="cc">Credit Card</option>
            </select>
            <button class="expenseBtn" onclick="addExpense()">Add Expense</button>
        </section>
        <section id="income-inputs">
            <h3>Add Income</h3>
            <input type="date" id="inc-date">
            <input type="number" id="inc-amount" placeholder="Amount">
            <input type="text" id="inc-source" placeholder="Source (e.g., Salary, Refund)">

            <select id="inc-account">
                <option value="chk1">Checking 100</option>
                <option value="chk2">Checking 101</option>
                <option value="chk3">Pocket Change</option>
                <option value="sav">Savings</option>
            </select>

            <button class="incomeBtn" onclick="addIncome()">Add Income</button>
        </section>

        <section id="cc-payment-section">
            <h3>Pay Credit Card</h3>
            <input type="date" id="pay-date">
            <input type="number" id="pay-amount" placeholder="Payment Amount">
            <select id="pay-from-account">
                <option value="chk1">From Checking 100</option>
                <option value="chk2">From Checking 101</option>
            </select>
            <button onclick="payCreditCard()" style="background-color: #ffb74d; color: black;">Record Payment</button>
        </section>
        <section class="card">
            <h2>Transfer Funds</h2>
            <input type="date" id="trans-date">
            <input type="number" id="trans-amount" placeholder="Amount">

            <select id="trans-from-account">
                <option value="chk1">From Checking 100</option>
                <option value="chk2">From Checking 101</option>
                <option value="chk3">From Pocket Change</option>
                <option value="sav">From Savings</option>
            </select>

            <select id="trans-to-account">
                <option value="chk1">To Checking 100</option>
                <option value="chk2">To Checking 101</option>
                <option value="chk3">To Pocket Change</option>
                <option value="sav">To Savings</option>
                <option value="pc">To Pocket Change</option>
            </select>

            <button class="transferBtn" onclick="addTransfer()">Transfer</button>
        </section>

        <section id="history-section">
            <h3>Recent History</h3>
            <div id="transaction-list" class="history-container">
            </div>
        </section>
        <div class="card" style="margin-top: 20px;">
            <h3>Import Transactions</h3>
            <p style="font-size: 0.8rem; color: gray;">Upload your Bank or Credit Card CSV</p>
            <input type="file" id="csv-file" accept=".csv" onchange="importCSV(event)" style="margin-top: 10px;">
        </div>
        <div id="review-modal" class="modal"
            style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); overflow: auto;">
            <div class="card"
                style="margin: 5% auto; width: 90%; max-width: 800px; background: #1e1e1e; color: white; padding: 20px; border-radius: 12px;">
                <div
                    style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px;">
                    <h2>Review Import</h2>
                    <button onclick="closeReview()"
                        style="background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer;">×</button>
                </div>

                <div id="review-list" style="max-height: 400px; overflow-y: auto; margin: 20px 0;">
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button onclick="closeReview()" class="transferBtn" style="background: #333;">Cancel</button>
                    <button onclick="confirmImport()" class="transferBtn"
                        style="background: #bb86fc; color: #000;">Confirm & Save</button>
                </div>
            </div>
        </div>

    </main>

    <script type="module" src="./src/app.js"></script>
    <div id="toast" class="toast">Transaction Successful!</div>
</body>

</html>
